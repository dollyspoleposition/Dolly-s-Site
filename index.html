<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Dolly's Pole Position</title>
  <meta name="description" content="Dolly's Pole Position — behind the scenes content, uncensored videos, VIP chat, and exclusive photos." />
  <meta property="og:title" content="Dolly's Pole Position" />
  <meta property="og:description" content="Behind the scenes content, uncensored videos, VIP chat, and exclusive photos." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="banner-photo.png" />
  <link rel="preload" as="image" href="banner-photo.png" />

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-99L81SBD6T"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-99L81SBD6T');
  </script>

  <style>
    :root {
      --bg: #040406;
      --text: #ffffff;
      --muted: #cfc6cf;
      --muted-2: #9f97a0;
      --pink: #f3adc7;
      --pink-2: #ea87b1;
      --max: 940px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top center, rgba(243,173,199,0.08), transparent 20%),
        linear-gradient(180deg, #07070a 0%, #040406 100%);
      text-align: center;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: 14px 12px 110px;
    }

    .banner-link {
      display: block;
      border-radius: 28px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 18px 50px rgba(0,0,0,0.42);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .banner-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 24px 64px rgba(0,0,0,0.52);
    }

    .banner-link img {
      width: 100%;
      height: auto;
    }

    .carousel-shell {
      margin-top: 22px;
    }

    .carousel-wrap {
      position: relative;
      overflow: hidden;
      background: transparent;
    }

    .carousel-track {
      display: flex;
      transition: transform 0.38s ease;
      will-change: transform;
    }

    .slide {
      min-width: 100%;
      padding: 10px 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .slide-frame {
      position: relative;
      display: inline-block;
      width: auto;
      max-width: 100%;
      border-radius: 24px;
      padding: 1px;
      background: linear-gradient(
        90deg,
        #f3adc7 0%,
        #ea87b1 35%,
        #f3adc7 65%,
        #ea87b1 100%
      );
      background-size: 200% 100%;
      animation: borderFlow 6s linear infinite;
      box-shadow: 0 0 6px rgba(243, 173, 199, 0.10);
    }

    .slide-frame img {
      display: block;
      width: auto;
      max-width: 100%;
      max-height: 640px;
      height: auto;
      object-fit: contain;
      background: transparent;
      border-radius: 23px;
    }

    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 1px solid rgba(243,173,199,0.22);
      background: rgba(0,0,0,0.34);
      color: #fff;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      z-index: 5;
      transition: background 0.18s ease, border-color 0.18s ease;
      backdrop-filter: blur(8px);
    }

    .arrow:hover {
      background: rgba(243,173,199,0.10);
      border-color: rgba(243,173,199,0.42);
    }

    .arrow.left { left: 10px; }
    .arrow.right { right: 10px; }

    .dots {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.22);
      border: none;
      padding: 0;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .dot.active {
      background: linear-gradient(135deg, var(--pink), var(--pink-2));
      transform: scale(1.14);
    }

    .features {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px 18px;
      justify-items: center;
      align-items: start;
    }

    .feature {
      position: relative;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 0 12px;
      color: #fff;
    }

    .feature .icon {
      font-size: 20px;
      line-height: 1;
    }

    .feature .label {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #fff;
      position: relative;
    }

    .feature .label::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -7px;
      transform: translateX(-50%);
      width: 62%;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        #f3adc7 0%,
        #ea87b1 35%,
        #f3adc7 65%,
        #ea87b1 100%
      );
      background-size: 200% 100%;
      animation: accentFlow 5s linear infinite;
      box-shadow: 0 0 5px rgba(243,173,199,0.16);
    }

    .footer {
      margin-top: 18px;
      color: var(--muted-2);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .sticky {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 9999;
      display: none;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 58px;
      padding: 0 28px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--pink), var(--pink-2));
      color: #111;
      font-size: 15px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      box-shadow: 0 14px 34px rgba(234,135,177,0.22);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 40px rgba(234,135,177,0.28);
    }

    .sticky .btn-primary {
      width: 100%;
      min-height: 56px;
    }

    @keyframes borderFlow {
      0% { background-position: 200% 0; }
      100% { background-position: 0 0; }
    }

    @keyframes accentFlow {
      0% { background-position: 200% 0; }
      100% { background-position: 0 0; }
    }

    @media (max-width: 780px) {
      .slide-frame img {
        max-height: 500px;
      }

      .feature .label {
        font-size: 12px;
      }

      .arrow {
        width: 40px;
        height: 40px;
        font-size: 22px;
      }

      .sticky {
        display: block;
      }

      body {
        padding-bottom: 84px;
      }
    }

    @media (max-width: 560px) {
      .slide-frame img {
        max-height: 420px;
      }

      .features {
        gap: 12px 10px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <a
      class="banner-link"
      href="https://fansly.com/dollyspoleposition"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Open Fansly"
      onclick="trackFanslyClick('banner_click')"
    >
      <img src="banner-photo.png" alt="Dolly's Pole Position banner" />
    </a>

    <section class="carousel-shell" aria-label="Photo gallery">
      <div class="carousel-wrap">
        <button class="arrow left" type="button" aria-label="Previous slide" onclick="prevSlide()">‹</button>

        <div class="carousel-track" id="carouselTrack">
          <div class="slide">
            <div class="slide-frame">
              <img src="photo1.jpg" alt="Dolly gallery photo 1" loading="lazy" />
            </div>
          </div>

          <div class="slide">
            <div class="slide-frame">
              <img src="photo2.jpg" alt="Dolly gallery photo 2" loading="lazy" />
            </div>
          </div>

          <div class="slide">
            <div class="slide-frame">
              <img src="photo3.jpg" alt="Dolly gallery photo 3" loading="lazy" />
            </div>
          </div>
        </div>

        <button class="arrow right" type="button" aria-label="Next slide" onclick="nextSlide()">›</button>
      </div>

      <div class="dots" id="dots"></div>
    </section>

    <section class="features" aria-label="Features">
      <div class="feature"><span class="icon">🔒</span><span class="label">Behind The Scenes</span></div>
      <div class="feature"><span class="icon">🎥</span><span class="label">Uncensored Videos</span></div>
      <div class="feature"><span class="icon">💬</span><span class="label">VIP Chat</span></div>
      <div class="feature"><span class="icon">📸</span><span class="label">Exclusive Photos</span></div>
    </section>

    <div class="footer">dollyspoleposition.vip © 2026</div>
  </main>

  <div class="sticky">
    <a
      class="btn-primary"
      href="https://fansly.com/dollyspoleposition"
      target="_blank"
      rel="noopener noreferrer"
      onclick="trackFanslyClick('sticky_cta_click')"
    >🏁 Enter My Garage</a>
  </div>

  <script>
    const track = document.getElementById('carouselTrack');
    const dotsWrap = document.getElementById('dots');
    const totalSlides = track.children.length;
    let currentIndex = 0;
    let autoRotate;
    let startX = 0;
    let endX = 0;

    function renderDots() {
      dotsWrap.innerHTML = '';
      for (let i = 0; i < totalSlides; i++) {
        const dot = document.createElement('button');
        dot.className = 'dot' + (i === currentIndex ? ' active' : '');
        dot.type = 'button';
        dot.setAttribute('aria-label', 'Go to slide ' + (i + 1));
        dot.addEventListener('click', () => {
          currentIndex = i;
          updateCarousel();
          restartAutoRotate();
        });
        dotsWrap.appendChild(dot);
      }
    }

    function updateCarousel() {
      track.style.transform = `translateX(-${currentIndex * 100}%)`;
      [...dotsWrap.children].forEach((dot, i) => {
        dot.classList.toggle('active', i === currentIndex);
      });
    }

    function nextSlide() {
      currentIndex = (currentIndex + 1) % totalSlides;
      updateCarousel();
    }

    function prevSlide() {
      currentIndex = (currentIndex - 1 + totalSlides) % totalSlides;
      updateCarousel();
    }

    function restartAutoRotate() {
      clearInterval(autoRotate);
      autoRotate = setInterval(nextSlide, 3600);
    }

    function trackFanslyClick(label) {
      if (typeof gtag === 'function') {
        gtag('event', 'fansly_click', {
          event_category: 'engagement',
          event_label: label
        });
      }
    }

    track.addEventListener('touchstart', (e) => {
      startX = e.changedTouches[0].screenX;
    }, { passive: true });

    track.addEventListener('touchend', (e) => {
      endX = e.changedTouches[0].screenX;
      if (startX - endX > 40) {
        nextSlide();
        restartAutoRotate();
      } else if (endX - startX > 40) {
        prevSlide();
        restartAutoRotate();
      }
    }, { passive: true });

    renderDots();
    updateCarousel();
    autoRotate = setInterval(nextSlide, 3600);
  </script>
</body>
</html>
