  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;

    .hero-new img {

      box-shadow: 0 10px 30px rgba(255,46,99,0.4);

      margin-top: 10px;
    }

    .live {
      font-size: 13px;
      color: #aaa;
      margin-top: 8px;
    }

    .dot {
      height: 8px;
      width: 8px;
      background-color: #00ff88;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.3; }

  <script>
