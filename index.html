<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dolly's Pole Position</title>
<style>
  :root {
    --bg: #050507;
    --panel: #0d0d12;
    --panel2: rgba(255,255,255,0.04);
    --text: #ffffff;
    --muted: #b7b7c9;
    --red: #ff2b3d;
    --pink: #ff4ea6;
    --border: rgba(255,255,255,0.08);
    --shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background:
      radial-gradient(circle at top center, rgba(255,43,61,0.10), transparent 28%),
      radial-gradient(circle at top right, rgba(255,78,166,0.08), transparent 24%),
      linear-gradient(180deg, #060608 0%, #030304 100%);
    color: var(--text);
    text-align: center;
  }

  a {
    text-decoration: none;
    color: inherit;
  }

  .banner {
    width: 100%;
    background: #000;
    box-shadow: var(--shadow);
  }

  .banner img {
    width: 100%;
    display: block;
    cursor: pointer;
  }

  .container {
    max-width: 980px;
    margin: 0 auto;
    padding: 24px 18px 110px;
  }

  .cta {
    margin: 22px 0 26px;
  }

  .btn {
    background: linear-gradient(135deg, var(--red), var(--pink));
    padding: 16px 28px;
    border-radius: 14px;
    color: white;
    font-weight: 800;
    font-size: 18px;
    display: block;
    margin: 0 auto;
    box-shadow: 0 14px 34px rgba(255,43,61,0.28);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    border: 1px solid rgba(255,255,255,0.12);
    letter-spacing: 0.4px;
    max-width: 320px;
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 18px 40px rgba(255,78,166,0.32);
  }

  .section-sub {
    color: var(--muted);
    max-width: 700px;
    margin: 0 auto 18px;
    line-height: 1.6;
    font-size: 16px;
  }

  .live-counter {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin: 12px auto 18px;
    padding: 9px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.2px;
  }

  .live-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 10px rgba(34,197,94,0.7);
    animation: livePulse 1.8s infinite;
  }

  .carousel-shell {
  background: none;
  border: none;
  padding: 0;
  box-shadow: none;
}

  .carousel {
    position: relative;
    max-width: 430px;
    margin: 0 auto;
    overflow: hidden;
    border-radius: 18px;
    touch-action: pan-y;
  }

  .carousel img {
    width: 100%;
    border-radius: 18px;
    display: block;
    aspect-ratio: 4 / 5;
    object-fit: cover;
    box-shadow: 0 16px 50px rgba(0,0,0,0.35);
    transition: opacity 0.28s ease, transform 0.28s ease;
    opacity: 1;
  }

  .carousel img.is-changing {
    opacity: 0.88;
    transform: scale(0.992);
  }

  .controls {
    margin-top: 14px;
    display: flex;
    justify-content: center;
    gap: 12px;
  }

  .controls button {
    width: 48px;
    height: 48px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06);
    color: white;
    font-size: 20px;
    cursor: pointer;
    transition: transform 0.18s ease, background 0.18s ease;
  }

  .controls button:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,0.10);
  }

  .dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 14px;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    transition: transform 0.18s ease, background 0.18s ease;
  }

  .dot.active {
    background: linear-gradient(135deg, var(--red), var(--pink));
    transform: scale(1.15);
  }

  .features {
    margin-top: 28px;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
  }

  .feature {
    background: none;
    border: none;
    padding: 8px 0;
    box-shadow: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .feature .emoji {
    font-size: 14px;
    margin: 0;
  }

  .feature h3 {
    margin: 0;
    font-size: 15px;
    font-weight: 500;
    color: var(--muted);
  }

  .feature p {
    display: none;
  }

  .footer {
    margin-top: 34px;
    color: #7f7f91;
    font-size: 13px;
  }

  .sticky {
    position: fixed;
    bottom: 12px;
    left: 12px;
    right: 12px;
    z-index: 999;
    display: none;
  }

  .sticky .btn {
    width: 100%;
    display: block;
    animation: pulse 2s infinite;
    max-width: none;
  }

  @keyframes pulse {
    0% { box-shadow: 0 14px 34px rgba(255,43,61,0.24); }
    50% { box-shadow: 0 18px 40px rgba(255,78,166,0.34); }
    100% { box-shadow: 0 14px 34px rgba(255,43,61,0.24); }
  }

  @keyframes livePulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.15); opacity: 0.7; }
    100% { transform: scale(1); opacity: 1; }
  }

  @media (max-width: 700px) {
    .container {
      padding: 18px 14px 110px;
    }

    .btn {
      width: 100%;
      padding: 16px 18px;
      max-width: none;
    }

    .features {
      grid-template-columns: 1fr;
    }

    .sticky {
      display: block;
    }
  }
</style>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-99L81SBD6T"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}

  </script>
</head>
<body>

<div class="banner">
  <a href="https://onlyfans.com/dollyspoleposition" target="_blank" rel="noopener noreferrer" onclick="gtag('event','click',{event_category:'outbound',event_label:'of_click'});">
    <img src="banner.PNG" alt="Dolly banner">
  </a>
</div>

<div class="container">
  <p class="section-sub">Ready for pole position?.</p>

  <div class="carousel-shell">
    <div class="carousel">
      <img id="slide" src="photo1.jpg" alt="Dolly photo" />
    </div>

    <div class="controls">
      <button onclick="prev()" aria-label="Previous photo">⬅️</button>
      <button onclick="next()" aria-label="Next photo">➡️</button>
    </div>

    <div class="dots">
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>

  <div class="cta">
    <a class="btn" href="https://onlyfans.com/dollyspoleposition" target="_blank" rel="noopener noreferrer" onclick="gtag('event','click',{event_category:'outbound',event_label:'of_click'});">Unlock My Garage</a>
    <div class="live-counter">
      <span class="live-dot"></span>
      <span><strong id="viewerCount">27</strong> people viewing my garage</span>
    </div>
    <div style="font-size:13px; color:#aaa; margin-top:8px;">Limited spots available today</div>
    <div style="font-size:13px; color:#aaa; margin-top:6px;">🔒 Private • No spam • Cancel anytime</div>
    <div style="font-size:12px; color:#888; margin-top:6px;">🔞 18+ Only</div>
  </div>

  <div class="features">
    <div class="feature">
      <div class="emoji">💬</div>
      <h3>Daily Chats</h3>
    </div>

    <div class="feature">
      <div class="emoji">🎥</div>
      <h3>Unfiltered Videos</h3>
    </div>

    <div class="feature">
      <div class="emoji">🔥</div>
      <h3>Exclusive Content</h3>
    </div>

    <div class="feature">
      <div class="emoji">🏁</div>
      <h3>VIP Treatment</h3>
    </div>
  </div>

  <div class="footer">dollyspoleposition.vip © 2026</div>
</div>

<div class="sticky">
  <a class="btn" href="https://onlyfans.com/dollyspoleposition" target="_blank" rel="noopener noreferrer" onclick="gtag('event','click',{event_category:'outbound',event_label:'of_click'});">🏁 Unlock My Garage</a>
</div>

<script>
  const images = ["photo1.jpg", "photo2.jpg", "photo3.jpg"];
  let i = 0;
  const dots = document.querySelectorAll('.dot');
  const slideEl = document.getElementById('slide');
  const carouselEl = document.querySelector('.carousel');
  let autoRotate = setInterval(next, 3500);
  let startX = 0;
  let endX = 0;

  function show() {
    slideEl.classList.add('is-changing');
    setTimeout(() => {
      slideEl.src = images[i];
      dots.forEach((dot, index) => {
        dot.classList.toggle('active', index === i);
      });
      requestAnimationFrame(() => {
        slideEl.classList.remove('is-changing');
      });
    }, 120);
  }

  function restartAutoRotate() {
    clearInterval(autoRotate);
    autoRotate = setInterval(next, 3500);
  }

  function next() {
    i = (i + 1) % images.length;
    show();
  }

  function prev() {
    i = (i - 1 + images.length) % images.length;
    show();
  }

  carouselEl.addEventListener('touchstart', (e) => {
    startX = e.changedTouches[0].screenX;
  }, { passive: true });

  carouselEl.addEventListener('touchend', (e) => {
    endX = e.changedTouches[0].screenX;
    if (startX - endX > 40) {
      next();
      restartAutoRotate();
    } else if (endX - startX > 40) {
      prev();
      restartAutoRotate();
    }
  }, { passive: true });

  carouselEl.addEventListener('click', restartAutoRotate);

  const viewerCountEl = document.getElementById('viewerCount');
  let viewerCount = 27;

  setInterval(() => {
    const change = Math.random() > 0.5 ? 1 : -1;
    viewerCount = Math.max(18, Math.min(43, viewerCount + change));
    viewerCountEl.textContent = viewerCount;
  }, 4000);
</script>

</body>
</html>
