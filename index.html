<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dolly's Pole Position</title>
  <style>
    :root {
      --bg: #050507;
      --panel: #0d0d12;
      --text: #ffffff;
      --muted: #cfc7cf;
      --muted-2: #9f96a1;
      --pink: #f3a7c6;
      --pink-strong: #ea7fad;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 20px 60px rgba(0,0,0,0.4);
      --max: 1080px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top center, rgba(243,167,198,0.10), transparent 24%),
        linear-gradient(180deg, #08080b 0%, #040406 100%);
      text-align: center;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: 18px 16px 100px;
    }

    

    .banner-link {
      display: block;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      background: #000;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .banner-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 24px 70px rgba(0,0,0,0.48);
    }

    .banner-link img {
      width: 100%;
      display: block;
    }

    .intro {
      margin: 26px auto 0;
      max-width: 860px;
    }

    .eyebrow {
      margin: 0;
      color: var(--pink);
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 13px;
      font-weight: 800;
    }

    .headline {
      margin: 14px 0 0;
      font-size: clamp(34px, 6vw, 68px);
      line-height: 0.96;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #fff;
    }

    .subtext {
      max-width: 700px;
      margin: 18px auto 0;
      font-size: 20px;
      line-height: 1.65;
      color: var(--muted);
    }

    .tagline {
      margin-top: 18px;
      font-size: 15px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .tagline span {
      color: var(--pink);
      padding: 0 10px;
    }

    .carousel-shell {
  margin-top: 34px;
  padding: 0;
  border: none;
  background: transparent;
  box-shadow: none;
}

    .carousel-wrap {
  position: relative;
  overflow: hidden;
  border-radius: 22px;
  background: transparent;
}

.slide {
  min-width: 100%;
  padding: 18px;
  display: flex;
  justify-content: center;
}

    .carousel-track {
      display: flex;
      transition: transform 0.35s ease;
    }

    .slide {
      min-width: 100%;
      padding: 0;
    }

    .slide img {
  width: 100%;
  aspect-ratio: 16 / 9;
  object-fit: contain;
  object-position: center;
  background: #0a0a0d;
}
    .slide-frame {
  position: relative;
  display: inline-block;
  border-radius: 22px;
  padding: 2px;
  background: linear-gradient(90deg, #f3a7c6, #ff4fa3, #f3a7c6, #ff4fa3);
  background-size: 300% 300%;
  animation: pinkBorderMove 4s linear infinite;
  box-shadow: 0 0 18px rgba(243,167,198,0.35);
}

.slide-frame img {
  display: block;
  width: 100%;
  max-width: 900px;
  height: 650px;
  object-fit: contain;
  object-position: center;
  background: transparent;
  border-radius: 20px;
}
    @keyframes pinkBorderMove {
  0% {
    background-position: 0% 50%;
  }
  100% {
    background-position: 100% 50%;
  }
}
    }

    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 54px;
      height: 54px;
      border-radius: 999px;
      border: 1px solid rgba(243,167,198,0.45);
      background: rgba(0,0,0,0.45);
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      z-index: 5;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .arrow:hover {
      background: rgba(243,167,198,0.16);
    }

    .arrow.left { left: 14px; }
    .arrow.right { right: 14px; }

    .dots {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 16px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .dot.active {
      background: linear-gradient(135deg, var(--pink), var(--pink-strong));
      transform: scale(1.15);
    }

    .cta-panel {
      margin-top: 30px;
      padding: 34px 24px;
      border-radius: 28px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(14,14,18,0.96), rgba(8,8,12,0.96));
      box-shadow: var(--shadow);
    }

    .cta-title {
      margin: 0;
      font-size: clamp(32px, 5vw, 58px);
      line-height: 0.98;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #fff;
    }

    .cta-desc {
      max-width: 680px;
      margin: 16px auto 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.65;
    }

    .buttons {
      margin-top: 26px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .btn {
      min-height: 68px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 800;
      font-size: 15px;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--pink), var(--pink-strong));
      color: #111;
      box-shadow: 0 14px 34px rgba(234,127,173,0.26);
    }

    .btn-secondary {
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.02);
      color: #fff;
    }

    .socials {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .social {
      min-width: 54px;
      height: 54px;
      padding: 0 18px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03);
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .social:hover {
      color: var(--pink);
      border-color: rgba(243,167,198,0.4);
    }

    .footer {
      margin-top: 22px;
      color: var(--muted-2);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .sticky {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      display: none;
      z-index: 999;
    }

    .sticky .btn {
      width: 100%;
      min-height: 58px;
      box-shadow: 0 16px 36px rgba(234,127,173,0.30);
    }

    @media (max-width: 780px) {
      .topbar {
        gap: 16px;
        font-size: 11px;
        flex-wrap: wrap;
        padding-bottom: 14px;
      }

      .subtext,
      .cta-desc {
        font-size: 16px;
      }

      .carousel-shell,
      .cta-panel {
        padding: 16px;
      }

      .buttons {
        grid-template-columns: 1fr;
      }

      .slide img {
        aspect-ratio: 4 / 5;
      }

      .arrow {
        width: 46px;
        height: 46px;
        font-size: 20px;
      }

      .sticky {
        display: block;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    

    <a
      id="top"
      class="banner-link"
      href="https://fansly.com/dollyspoleposition"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Open Fansly"
    >
      <img src="banner-photo.png" alt="Dolly's Pole Position banner" />
    </a>

   

    <section class="carousel-shell" id="gallery">
      <div class="carousel-wrap">
        <button class="arrow left" type="button" aria-label="Previous slide" onclick="prevSlide()">‹</button>
        <div class="carousel-track" id="carouselTrack">
          <div class="slide"><img src="photo1.jpg" alt="Dolly gallery photo 1" /></div>
          <div class="slide"><img src="photo2.jpg" alt="Dolly gallery photo 2" /></div>
          <div class="slide"><img src="photo3.jpg" alt="Dolly gallery photo 3" /></div>
          <div class="slide"><img src="photo4.jpg" alt="Dolly gallery photo 4" /></div>
          <div class="slide"><img src="photo5.jpg" alt="Dolly gallery photo 5" /></div>
        </div>
        <button class="arrow right" type="button" aria-label="Next slide" onclick="nextSlide()">›</button>
      </div>

      <div class="dots" id="dots"></div>
    </section>

    <section class="cta-panel" id="access">
      <h2 class="cta-title">Private Access</h2>
      <p class="cta-desc">
        A simple, clean landing page with a luxury motorsport feel — built around your banner, your images, and one strong conversion path.
      </p>

      <div class="buttons">
        <a class="btn btn-primary" href="https://fansly.com/dollyspoleposition" target="_blank" rel="noopener noreferrer">Enter My Garage</a>
      </div>

      
    </section>

    <div class="footer">dollyspoleposition.vip © 2026</div>
  </main>

  <div class="sticky">
    <a class="btn btn-primary" href="https://fansly.com/dollyspoleposition" target="_blank" rel="noopener noreferrer">Enter My Garage</a>
  </div>

  <script>
    const track = document.getElementById('carouselTrack');
    const dotsWrap = document.getElementById('dots');
    const totalSlides = track.children.length;
    let currentIndex = 0;
    let autoRotate;
    let startX = 0;
    let endX = 0;

    function renderDots() {
      dotsWrap.innerHTML = '';
      for (let i = 0; i < totalSlides; i++) {
        const dot = document.createElement('button');
        dot.className = 'dot' + (i === currentIndex ? ' active' : '');
        dot.type = 'button';
        dot.setAttribute('aria-label', 'Go to slide ' + (i + 1));
        dot.addEventListener('click', () => {
          currentIndex = i;
          updateCarousel();
          restartAutoRotate();
        });
        dotsWrap.appendChild(dot);
      }
    }

    function updateCarousel() {
      track.style.transform = `translateX(-${currentIndex * 100}%)`;
      [...dotsWrap.children].forEach((dot, i) => {
        dot.classList.toggle('active', i === currentIndex);
      });
    }

    function nextSlide() {
      currentIndex = (currentIndex + 1) % totalSlides;
      updateCarousel();
    }

    function prevSlide() {
      currentIndex = (currentIndex - 1 + totalSlides) % totalSlides;
      updateCarousel();
    }

    function restartAutoRotate() {
      clearInterval(autoRotate);
      autoRotate = setInterval(nextSlide, 3500);
    }

    track.addEventListener('touchstart', (e) => {
      startX = e.changedTouches[0].screenX;
    }, { passive: true });

    track.addEventListener('touchend', (e) => {
      endX = e.changedTouches[0].screenX;
      if (startX - endX > 40) {
        nextSlide();
        restartAutoRotate();
      } else if (endX - startX > 40) {
        prevSlide();
        restartAutoRotate();
      }
    }, { passive: true });

    renderDots();
    updateCarousel();
    autoRotate = setInterval(nextSlide, 3500);
  </script>
</body>
</html>
