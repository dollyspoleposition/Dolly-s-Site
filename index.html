<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

<style>
:root{
  --bg:#040406;
  --text:#ffffff;
  --muted:#9f97a0;
  --pink:#f3adc7;
  --pink2:#ea87b1;
  --max:940px;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:
    radial-gradient(circle at top center, rgba(243,173,199,.08), transparent 20%),
    linear-gradient(180deg,#07070a 0%, #040406 100%);
  color:var(--text);
  text-align:center;
  overflow-x:hidden;
}

a{
  text-decoration:none;
  color:inherit;
}

img{
  max-width:100%;
  display:block;
}

.wrap{
  max-width:var(--max);
  margin:0 auto;
  padding:14px 12px 110px;
}

/* Banner */
.banner-link{
  display:block;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 18px 50px rgba(0,0,0,.42);
}

.banner-link img{
  width:100%;
}

/* Carousel */
.carousel-shell{
  margin-top:22px;
}

.carousel-wrap{
  position:relative;
  overflow:hidden;
}

.carousel-track{
  display:flex;
  transition:transform .4s ease;
}

.slide{
  min-width:100%;
  display:flex;
  justify-content:center;
  padding:10px 0;
}

.slide-frame{
  display:inline-block;
  max-width:100%;
  padding:1px;
  border-radius:24px;
  background:linear-gradient(
    90deg,
    #f3adc7 0%,
    #ea87b1 35%,
    #f3adc7 65%,
    #ea87b1 100%
  );
  background-size:200% 100%;
  animation:borderFlow 6s linear infinite;
}

.slide-frame img{
  max-width:100%;
  max-height:640px;
  height:auto;
  border-radius:23px;
}

.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:44px;
  height:44px;
  border-radius:999px;
  border:1px solid rgba(243,173,199,.25);
  background:rgba(0,0,0,.35);
  color:white;
  font-size:24px;
  cursor:pointer;
}

.arrow.left{
  left:10px;
}

.arrow.right{
  right:10px;
}

.dots{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:rgba(255,255,255,.2);
  border:none;
  cursor:pointer;
}

.dot.active{
  background:linear-gradient(135deg,var(--pink),var(--pink2));
}

/* Features */
.features{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
}

.feature{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}

.feature .icon{
  font-size:20px;
}

.feature .label{
  font-size:13px;
  font-weight:700;
  text-transform:uppercase;
  position:relative;
}

.feature .label::after{
  content:"";
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:-6px;
  width:60%;
  height:2px;
  border-radius:999px;
  background:linear-gradient(
    90deg,
    #f3adc7,
    #ea87b1,
    #f3adc7
  );
  background-size:200% 100%;
  animation:accentFlow 5s linear infinite;
}

/* Desktop CTA */
.desktop-cta{
  margin-top:28px;
}

/* Button */
.btn-primary{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:58px;
  padding:0 28px;
  border-radius:16px;
  background:linear-gradient(135deg,var(--pink),var(--pink2));
  color:#111;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.08em;
}

/* Footer */
.footer{
  margin-top:20px;
  color:var(--muted);
  font-size:12px;
}

/* Mobile sticky */
.sticky{
  position:fixed;
  left:12px;
  right:12px;
  bottom:12px;
  display:none;
  z-index:9999;
}

.sticky .btn-primary{
  width:100%;
}

@keyframes borderFlow{
  0%{background-position:200% 0;}
  100%{background-position:0 0;}
}

@keyframes accentFlow{
  0%{background-position:200% 0;}
  100%{background-position:0 0;}
}

@media(max-width:780px){
  .slide-frame img{
    max-height:500px;
  }

  .desktop-cta{
    display:none;
  }

  .sticky{
    display:block;
  }

  body{
    padding-bottom:85px;
  }
}

@media(max-width:560px){
  .slide-frame img{
    max-height:420px;
  }

  .feature .label{
    font-size:11px;
  }
}
</style>
</head>

<body>

<main class="wrap">

<a class="banner-link"
href="https://fansly.com/dollyspoleposition"
target="_blank"
onclick="trackFanslyClick('banner_click')">
<img src="banner-photo.png" alt="Banner">
</a>

<section class="carousel-shell">
<div class="carousel-wrap">

<button class="arrow left" onclick="prevSlide()">‹</button>

<div class="carousel-track" id="carouselTrack">

<div class="slide">
<div class="slide-frame">
<img src="photo1.jpg">
</div>
</div>

<div class="slide">
<div class="slide-frame">
<img src="photo2.jpg">
</div>
</div>

<div class="slide">
<div class="slide-frame">
<img src="photo3.jpg">
</div>
</div>

</div>

<button class="arrow right" onclick="nextSlide()">›</button>

</div>

<div class="dots" id="dots"></div>
</section>

<section class="features">
<div class="feature">
<div class="icon">🔒</div>
<div class="label">Behind The Scenes</div>
</div>

<div class="feature">
<div class="icon">🎥</div>
<div class="label">Uncensored Videos</div>
</div>

<div class="feature">
<div class="icon">💬</div>
<div class="label">VIP Chat</div>
</div>

<div class="feature">
<div class="icon">📸</div>
<div class="label">Exclusive Photos</div>
</div>
</section>

<div class="desktop-cta">
<a class="btn-primary"
href="https://fansly.com/dollyspoleposition"
target="_blank"
onclick="trackFanslyClick('desktop_cta_click')">
🏁 Enter My Garage
</a>
</div>

<div class="footer">
dollyspoleposition.vip © 2026
</div>

</main>

<div class="sticky">
<a class="btn-primary"
href="https://fansly.com/dollyspoleposition"
target="_blank"
onclick="trackFanslyClick('sticky_cta_click')">
🏁 Enter My Garage
</a>
</div>

<script>
const track=document.getElementById("carouselTrack");
const dotsWrap=document.getElementById("dots");
const totalSlides=track.children.length;
let currentIndex=0;

function renderDots(){
  dotsWrap.innerHTML="";
  for(let i=0;i<totalSlides;i++){
    const dot=document.createElement("button");
    dot.className="dot"+(i===currentIndex?" active":"");
    dot.onclick=()=>{
      currentIndex=i;
      updateCarousel();
    };
    dotsWrap.appendChild(dot);
  }
}

function updateCarousel(){
  track.style.transform=`translateX(-${currentIndex*100}%)`;
  [...dotsWrap.children].forEach((dot,i)=>{
    dot.classList.toggle("active",i===currentIndex);
  });
}

function nextSlide(){
  currentIndex=(currentIndex+1)%totalSlides;
  updateCarousel();
}

function prevSlide(){
  currentIndex=(currentIndex-1+totalSlides)%totalSlides;
  updateCarousel();
}

function trackFanslyClick(label){
  if(typeof gtag==="function"){
    gtag("event","fansly_click",{
      event_category:"engagement",
      event_label:label
    });
  }
}

renderDots();
setInterval(nextSlide,3600);
</script>

</body>
</html>
